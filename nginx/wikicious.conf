# Wikicious V6 — Nginx Configuration
server {
    listen 80;
    server_name wikicious.io www.wikicious.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name wikicious.io www.wikicious.io;

    ssl_certificate     /etc/letsencrypt/live/wikicious.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wikicious.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    # Frontend
    root /var/www/wikicious;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API backend
    location /api/ {
        proxy_pass         http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # WebSocket
    location /ws {
        proxy_pass         http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
}

# Admin panel — internal only
server {
    listen 8443 ssl http2;
    server_name admin.wikicious.io;

    ssl_certificate     /etc/letsencrypt/live/wikicious.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wikicious.io/privkey.pem;

    # Basic auth
    auth_basic           "Wikicious Admin";
    auth_basic_user_file /etc/nginx/.htpasswd;

    root /var/www/admin;
    index wikicious-admin.html;

    location / { try_files $uri /wikicious-admin.html; }
}
