version: 2
updates:
  # --- Smart Contracts (Hardhat) ---
  - package-ecosystem: "npm"
    directory: "/contracts" 
    schedule:
      interval: "daily"

  # --- Frontend (React) ---
  - package-ecosystem: "npm"
    directory: "/frontend" 
    schedule:
      interval: "daily"

  # --- Mobile (Flutter) ---
  - package-ecosystem: "pub"
    directory: "/mobile"
    schedule:
      interval: "daily"

  # --- Backend / Bots (Node.js) ---
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "daily"
